services:

  # ── Whisper STT ─────────────────────────────────────────────────────────────
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    image: bianca-whisper:latest
    container_name: bianca-whisper
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      WHISPER_MODEL_SIZE: large-v3
      HF_HUB_OFFLINE: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      # Model load is 30-90s when weights are cached; increase to 300s on first
      # run if weights need to be downloaded (~3GB).
      start_period: 120s
      retries: 3

  # ── Triton / YOLO-World ─────────────────────────────────────────────────────
  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    image: bianca-triton:latest
    container_name: bianca-triton
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8001:8001"   # gRPC (used by deepstream service)
      - "8002:8002"   # HTTP model management + metrics
      - "8003:8003"   # Prometheus metrics
      - "8004:8004"   # Management sidecar — TRT re-export API
    volumes:
      - ./triton_models:/models
      - ${HOME}/.cache/ultralytics:/root/.cache/ultralytics
      - ./models:/trt_engines           # TRT engine files — mounted at /trt_engines
    environment:
      YOLOWORLD_MODEL: "yolov8m-worldv2"
      YOLO_CONFIG_DIR: "/root/.cache/ultralytics"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/v2/health/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 240s
      retries: 3

  # ── DeepStream inference/API service ─────────────────────────────────────────
  # Serves the REST API, receives JPEG frames from Savant pyfunc at /internal/frame,
  # calls Triton for YOLO-World inference, tracks objects, fires events, manages clips.
  # Also manages per-camera Savant RTSP adapter containers via Docker socket.
  deepstream:
    build:
      context: .
      dockerfile: Dockerfile.deepstream
    image: bianca-deepstream:latest
    container_name: bianca-deepstream
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8090:8090"   # REST API + internal/frame endpoint
    volumes:
      - ./services:/app/services
      - ./models:/app/models
      - ${HOME}/.cache/ultralytics:/root/.cache/ultralytics
      - ./cameras.json:/app/cameras.json
      - ./clips:/app/clips
    environment:
      TRITON_URL: "triton:8001"
      CAMERAS_JSON_PATH: /app/cameras.json
      CLIPS_DIR: /app/clips
      PYTHONUNBUFFERED: "1"
      # Phase 1 step B — control plane targets for stream + inference lifecycle
      MEDIAMTX_API_URL:  "http://bianca-mediamtx:9997"
      MEDIAMTX_RTSP_URL: "rtsp://bianca-mediamtx:8554"
      INFERENCE_URL:     "http://bianca-inference:8091"
      SEG_DURATION_S: "30"
      MAX_SEG_FILES: "25"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      triton:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
      inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Ollama / Qwen ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bianca-ollama
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MODEL: qwen2.5:14b
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Main app ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: bianca-app:latest
    container_name: bianca-app
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8000:8000"
    volumes:
      - family-data:/data
      - app-logs:/app/logs
      - /home/jasvinder:/home/jasvinder:ro
      - ./clips:/app/clips:ro           # serve detection clips directly (read-only)
    env_file:
      - .env
    environment:
      # Override bare-metal localhost defaults from .env with Docker service names.
      # These four vars are the only differences between bare-metal and Docker runs.
      WHISPER_URL: http://whisper:8080
      TRITON_URL: triton:8001
      DEEPSTREAM_URL: http://deepstream:8090
      MEDIAMTX_HLS_URL: http://mediamtx:8888
      OLLAMA_BASE_URL: http://ollama:11434
      FAMILY_MD_PATH: /data/family.md
    # App intentionally has NO GPU reservation — it must be CUDA-free.
    # If a CUDA dependency sneaks into the app image, calls will fail fast here.
    depends_on:
      whisper:
        condition: service_healthy
      deepstream:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Phase 1 ingress: MediaMTX (replaces go2rtc + Savant sinks) ──────────────
  # Idle on first deploy; populated at runtime by services/deepstream_service.py
  # (or its successor) via MediaMTX HTTP API.  See mediamtx.yml for config.
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: bianca-mediamtx
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8888:8888"   # LL-HLS (proxied through bianca-app:/cameras/hls/*)
      - "8889:8889"   # WebRTC (Phase 5 escape hatch)
      # 8554 (RTSP) and 9997 (HTTP API) stay docker-network-only.
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Phase 1 inference: FastAPI control plane + subprocess-per-camera ────────
  # Replaces, architecturally: bianca-savant-module + per-camera bianca-rtsp-*
  # + per-camera bianca-sink-* + the inference loop in bianca-deepstream.
  # Idle on first deploy; populated by add_stream/remove_stream calls.
  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    image: bianca-inference:latest
    container_name: bianca-inference
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8091:8091"   # FastAPI control plane (deepstream_service proxies to this)
    volumes:
      - ./services:/app/services:ro
      - ./models:/app/models:ro
      - ./clips:/app/clips
    environment:
      WORKER_SCRIPT: /app/services/inference_worker.py
      PROTOTYPE_TRITON_URL: triton:8002
      PROTOTYPE_META: /app/models/yoloworld.meta.json
      PROTOTYPE_RTSP: rtsp://mediamtx:8554/{cam_id}
      # Worker subprocesses POST detection events here.  deepstream_service
      # owns the events deque and clip-trigger logic in Phase 1.
      DEEPSTREAM_URL: http://bianca-deepstream:8090
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      triton:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8091/').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

networks:
  bianca-net:
    driver: bridge

volumes:
  # family.md and logs survive app container restarts/rebuilds
  family-data:
  app-logs:
  # HuggingFace weights are bind-mounted from the host (~/.cache/huggingface)
  # so both whisper and triton use already-downloaded weights — no named volume needed.
  # Ollama model storage — qwen2.5:14b (~9GB) persists across restarts
  ollama-models:
  # ultralytics model cache (YOLO-World weights ~80MB, downloaded once)
  # bind-mounted from host so both triton and deepstream share them
