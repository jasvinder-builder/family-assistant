services:

  # ── Savant inference module ──────────────────────────────────────────────────
  # Receives RTSP frames from per-camera adapter containers via ZeroMQ, runs the
  # pyfunc that extracts JPEGs and forwards them to deepstream_service for Triton
  # inference, then outputs encoded frames to the Always-On Sink for browser display.
  savant-module:
    build:
      context: .
      dockerfile: Dockerfile.savant
    image: bianca-savant-module:latest
    container_name: bianca-savant-module
    restart: unless-stopped
    command: /opt/savant/pipeline/module.yml
    networks:
      - bianca-net
    ports:
      - "5555:5555"   # ZMQ ROUTER — RTSP adapters connect here
      - "5556:5556"   # ZMQ PUB — Always-On Sink subscribes here
    volumes:
      - ./pipeline:/opt/savant/pipeline:ro
    environment:
      MODULE_CONFIG: /opt/savant/pipeline/module.yml
      ZMQ_SRC_ENDPOINT: "router+bind:tcp://*:5555"
      ZMQ_SINK_ENDPOINT: "pub+bind:tcp://*:5556"
      DEEPSTREAM_URL: "http://bianca-deepstream:8090"
      INFER_FPS: "10"
      PYTHONPATH: "/opt/savant"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - deepstream
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; s=socket.socket(); s.connect(('localhost',5555)); s.close()"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Savant Always-On Sink — started dynamically per camera by deepstream ───────
  # One bianca-sink-{cam_id} container per camera, started via Docker SDK
  # alongside the RTSP adapter.  See deepstream_service._start_sink_container().
  # HLS is served by each sink's embedded MediaMTX on port 888 (Docker-network-only).
  # deepstream_service proxies /hls/{cam_id}/* to bianca-sink-{cam_id}:888.

  # ── go2rtc RTSP normalizing proxy ────────────────────────────────────────────
  # Single connection per camera to the real device; re-streams a DTS-clean copy
  # on RTSP port 8554.  Savant RTSP adapter connects here instead of the camera.
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: bianca-go2rtc
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "1984:1984"   # HTTP API (stream registration + debug UI)
      - "8554:8554"   # RTSP re-streams for Savant adapters
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/api/streams"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Whisper STT ─────────────────────────────────────────────────────────────
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    image: bianca-whisper:latest
    container_name: bianca-whisper
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      WHISPER_MODEL_SIZE: large-v3
      HF_HUB_OFFLINE: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      # Model load is 30-90s when weights are cached; increase to 300s on first
      # run if weights need to be downloaded (~3GB).
      start_period: 120s
      retries: 3

  # ── Triton / YOLO-World ─────────────────────────────────────────────────────
  triton:
    build:
      context: .
      dockerfile: Dockerfile.triton
    image: bianca-triton:latest
    container_name: bianca-triton
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8001:8001"   # gRPC (used by deepstream service)
      - "8002:8002"   # HTTP model management + metrics
      - "8003:8003"   # Prometheus metrics
      - "8004:8004"   # Management sidecar — TRT re-export API
    volumes:
      - ./triton_models:/models
      - ${HOME}/.cache/ultralytics:/root/.cache/ultralytics
      - ./models:/trt_engines           # TRT engine files — mounted at /trt_engines
    environment:
      YOLOWORLD_MODEL: "yolov8m-worldv2"
      YOLO_CONFIG_DIR: "/root/.cache/ultralytics"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/v2/health/ready')"]
      interval: 30s
      timeout: 10s
      start_period: 240s
      retries: 3

  # ── DeepStream inference/API service ─────────────────────────────────────────
  # Serves the REST API, receives JPEG frames from Savant pyfunc at /internal/frame,
  # calls Triton for YOLO-World inference, tracks objects, fires events, manages clips.
  # Also manages per-camera Savant RTSP adapter containers via Docker socket.
  deepstream:
    build:
      context: .
      dockerfile: Dockerfile.deepstream
    image: bianca-deepstream:latest
    container_name: bianca-deepstream
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8090:8090"   # REST API + internal/frame endpoint
    volumes:
      - ./services:/app/services
      - ./models:/app/models
      - ${HOME}/.cache/ultralytics:/root/.cache/ultralytics
      - ./cameras.json:/app/cameras.json
      - ./clips:/app/clips
      - ./stub.jpg:/app/stub.jpg:ro                 # placeholder image for always_on_rtsp sink containers
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-outside-Docker for RTSP adapter mgmt
    environment:
      TRITON_URL: "triton:8001"
      CAMERAS_JSON_PATH: /app/cameras.json
      CLIPS_DIR: /app/clips
      PYTHONUNBUFFERED: "1"
      SAVANT_MODULE_HOST: "bianca-savant-module"
      SAVANT_SINK_HOST: "bianca-savant-sink"
      STUB_FILE_HOST_PATH: "${PWD}/stub.jpg"
      DOCKER_NETWORK: "family-assistant_bianca-net"
      SEG_DURATION_S: "30"
      MAX_SEG_FILES: "25"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      triton:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Ollama / Qwen ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bianca-ollama
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MODEL: qwen2.5:14b
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Main app ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: bianca-app:latest
    container_name: bianca-app
    restart: unless-stopped
    networks:
      - bianca-net
    ports:
      - "8000:8000"
    volumes:
      - family-data:/data
      - app-logs:/app/logs
      - /home/jasvinder:/home/jasvinder:ro
      - ./clips:/app/clips:ro           # serve detection clips directly (read-only)
    env_file:
      - .env
    environment:
      # Override bare-metal localhost defaults from .env with Docker service names.
      # These four vars are the only differences between bare-metal and Docker runs.
      WHISPER_URL: http://whisper:8080
      TRITON_URL: triton:8001
      DEEPSTREAM_URL: http://deepstream:8090
      OLLAMA_BASE_URL: http://ollama:11434
      FAMILY_MD_PATH: /data/family.md
    # App intentionally has NO GPU reservation — it must be CUDA-free.
    # If a CUDA dependency sneaks into the app image, calls will fail fast here.
    depends_on:
      whisper:
        condition: service_healthy
      deepstream:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  bianca-net:
    driver: bridge

volumes:
  # family.md and logs survive app container restarts/rebuilds
  family-data:
  app-logs:
  # HuggingFace weights are bind-mounted from the host (~/.cache/huggingface)
  # so both whisper and triton use already-downloaded weights — no named volume needed.
  # Ollama model storage — qwen2.5:14b (~9GB) persists across restarts
  ollama-models:
  # ultralytics model cache (YOLO-World weights ~80MB, downloaded once)
  # bind-mounted from host so both triton and deepstream share them
