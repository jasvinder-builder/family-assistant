<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bianca — Family Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 2.5rem 1rem; text-align: center; }
    .hero h1 { font-size: 2.5rem; font-weight: 700; }
    .hero p { opacity: 0.85; font-size: 1.1rem; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); transition: transform .15s, box-shadow .15s; cursor: pointer; text-decoration: none; color: inherit; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .card-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .card-body { padding: 2rem 1.5rem; text-align: center; }
    .card-title { font-size: 1.3rem; font-weight: 600; }
    .card-text { color: #6b7280; font-size: 0.95rem; }
    .card-talk { background: linear-gradient(135deg, #dbeafe, #ede9fe); }
    .card-dashboard { background: linear-gradient(135deg, #dcfce7, #d1fae5); }
    .card-hangman { background: linear-gradient(135deg, #fef3c7, #fde68a); }
  </style>
</head>
<body>

<div class="hero">
  <h1>👋 Hi, I'm Bianca</h1>
  <p>Your family assistant — voice, todos, events, and games</p>
</div>

<div class="container py-5">
  <div class="row g-4 justify-content-center">

    <div class="col-sm-6 col-lg-4">
      <a href="/talk" class="card card-talk d-block">
        <div class="card-body">
          <div class="card-icon">🎙️</div>
          <div class="card-title">Talk to Bianca</div>
          <div class="card-text mt-1">Ask questions, add todos and events, search the web — hands-free</div>
        </div>
      </a>
    </div>

    <div class="col-sm-6 col-lg-4">
      <a href="/dashboard" class="card card-dashboard d-block">
        <div class="card-body">
          <div class="card-icon">📋</div>
          <div class="card-title">Family Dashboard</div>
          <div class="card-text mt-1">View and manage your family's todos and upcoming events</div>
        </div>
      </a>
    </div>

    <div class="col-sm-6 col-lg-4">
      <a href="/games/hangman" class="card card-hangman d-block">
        <div class="card-body">
          <div class="card-icon">🎮</div>
          <div class="card-title">Hangman</div>
          <div class="card-text mt-1">Guess the word letter by letter — play using your voice!</div>
        </div>
      </a>
    </div>

  </div>
</div>

</body>
</html>
