<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Talk to Bianca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/bundle.min.js"></script>
  <style>
    body { background: #f0f4f8; }
    .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 1rem 1.5rem; }
    .header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    #start-overlay {
      position: fixed; inset: 0; background: rgba(79,70,229,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    }
    #start-btn {
      width: 140px; height: 140px; border-radius: 50%; border: none;
      background: white; color: #4f46e5; font-size: 3rem;
      box-shadow: 0 0 0 0 rgba(255,255,255,0.4);
      animation: pulse-start 2s infinite;
      cursor: pointer;
    }
    @keyframes pulse-start {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      50%      { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
    }
    #voice-ring {
      width: 110px; height: 110px; border-radius: 50%;
      background: #e0e7ff; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 2.8rem;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #voice-ring.loading  { background: #f3f4f6; }
    #voice-ring.ready    { background: #e0e7ff; }
    #voice-ring.speech   { background: #4f46e5; animation: ripple 1s infinite; }
    #voice-ring.processing { background: #9ca3af; }
    @keyframes ripple {
      0%,100% { box-shadow: 0 0 0 0 rgba(79,70,229,0.35); }
      50%      { box-shadow: 0 0 0 18px rgba(79,70,229,0); }
    }
    #status { font-size: 0.9rem; color: #6b7280; min-height: 1.4rem; }
    .bubble { border-radius: 14px; padding: 0.75rem 1rem; max-width: 85%; }
    .bubble-user   { background: #4f46e5; color: white; align-self: flex-end; }
    .bubble-bianca { background: white; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); align-self: flex-start; }
    .bubble-label  { font-size: 0.75rem; color: #9ca3af; margin-bottom: 2px; }
    #detail-panel  { background: white; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); white-space: pre-wrap; font-size: 0.9rem; }
    #conversation  { display: flex; flex-direction: column; gap: 12px; max-height: 40vh; overflow-y: auto; }
  </style>
</head>
<body>

<div id="start-overlay">
  <div style="font-size:1.2rem;color:white;margin-bottom:1.5rem;font-weight:600;">Tap to start Bianca</div>
  <button id="start-btn" onclick="startApp()">🎙️</button>
  <div style="color:rgba(255,255,255,0.7);font-size:0.85rem;margin-top:1rem;">Allows mic and voice responses</div>
</div>

<div class="header d-flex align-items-center gap-3">
  <a href="/">← Home</a>
  <strong class="text-white ms-1">Talk to Bianca</strong>
</div>

<div class="container py-4" style="max-width:600px">

  <div class="mb-4 d-flex align-items-center gap-2">
    <label class="form-label mb-0 fw-semibold">You are:</label>
    <select class="form-select form-select-sm w-auto" id="caller-name">
      {% for name in family_names %}
      <option>{{ name }}</option>
      {% else %}
      <option>Family</option>
      {% endfor %}
    </select>
  </div>

  <div id="conversation" class="mb-4"></div>

  <div id="detail-panel" class="p-3 mb-4 d-none">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <strong>Full Answer</strong>
      <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('detail-panel').classList.add('d-none')">✕</button>
    </div>
    <div id="detail-text"></div>
  </div>

  <div class="text-center">
    <div id="voice-ring" class="loading">🎙️</div>
    <div id="status" class="mt-2">Loading voice engine...</div>
  </div>

</div>

<script>
let micVAD = null;
let isProcessing = false;

async function initVAD() {
  try {
    micVAD = await vad.MicVAD.new({
      baseAssetPath:   'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/',
      onnxWASMBasePath:'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
      model: 'v5',
      positiveSpeechThreshold: 0.8,
      negativeSpeechThreshold: 0.3,
      minSpeechMs: 250,
      onSpeechStart: () => {
        if (!isProcessing) {
          setRing('speech');
          setStatus('Listening...');
        }
      },
      onSpeechEnd: async (audio) => {
        if (isProcessing) return;
        isProcessing = true;
        micVAD.pause();
        setRing('processing');
        await transcribeAndChat(float32ToWav(audio, 16000));
      },
    });
    micVAD.start();
    setRing('ready');
    setStatus("Just speak — I'm listening");
  } catch (e) {
    setRing('loading');
    setStatus('Voice engine failed to load. Check that you are using the HTTPS ngrok URL.');
    console.error('VAD init failed:', e);
  }
}

async function transcribeAndChat(blob) {
  let transcript;
  try {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.wav');
    setStatus('Transcribing...');
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();
    transcript = data.transcript;
  } catch (e) {
    setStatus('Transcription failed.');
    resumeListening();
    return;
  }

  if (!transcript || transcript.trim().length < 2) {
    setStatus("Nothing heard — just speak again");
    resumeListening();
    return;
  }

  addBubble('user', transcript);
  setStatus('Thinking...');

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        transcript,
        caller_name: document.getElementById('caller-name').value,
      }),
    });
    const data = await resp.json();

    addBubble('bianca', data.speech);

    if (data.intent === 'research_web' && data.display !== data.speech) {
      document.getElementById('detail-text').textContent = data.display;
      document.getElementById('detail-panel').classList.remove('d-none');
    } else {
      document.getElementById('detail-panel').classList.add('d-none');
    }

    if (data.intent === 'goodbye') {
      speak(data.speech);
      micVAD.pause();
      setRing('loading');
      setStatus('Goodbye! Refresh to start again.');
      return;
    }

    speak(data.speech, resumeListening);
  } catch (e) {
    addBubble('bianca', 'Sorry, something went wrong. Please try again.');
    resumeListening();
  }
}

function resumeListening() {
  isProcessing = false;
  if (micVAD) micVAD.start();
  setRing('ready');
  setStatus("Just speak — I'm listening");
}

function addBubble(who, text) {
  const conv = document.getElementById('conversation');
  const wrap = document.createElement('div');
  wrap.className = `d-flex flex-column align-items-${who === 'user' ? 'end' : 'start'}`;
  const label = document.createElement('div');
  label.className = 'bubble-label';
  label.textContent = who === 'user' ? document.getElementById('caller-name').value : 'Bianca';
  const bubble = document.createElement('div');
  bubble.className = `bubble bubble-${who}`;
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  conv.appendChild(wrap);
  conv.scrollTop = conv.scrollHeight;
}

function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 1.0;
  utt.onend  = () => { if (onDone) onDone(); };
  utt.onerror = () => { if (onDone) onDone(); };
  window.speechSynthesis.speak(utt);
}

function setRing(state) {
  document.getElementById('voice-ring').className = state;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function float32ToWav(samples, sampleRate) {
  const len = samples.length;
  const buf = new ArrayBuffer(44 + len * 2);
  const view = new DataView(buf);
  const w = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  w(0, 'RIFF'); view.setUint32(4, 36 + len * 2, true);
  w(8, 'WAVE'); w(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
  view.setUint16(34, 16, true); w(36, 'data');
  view.setUint32(40, len * 2, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    off += 2;
  }
  return new Blob([buf], { type: 'audio/wav' });
}

// Unlock speech synthesis and start VAD — must be called from a user gesture
function startApp() {
  document.getElementById('start-overlay').style.display = 'none';
  // Play a silent utterance to unlock speechSynthesis in this browser context
  if (window.speechSynthesis) {
    const unlock = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(unlock);
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  initVAD();
}
</script>
</body>
</html>
