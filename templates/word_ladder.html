<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Ladder — Bianca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/bundle.min.js"></script>
  <style>
    body { background: #ecfdf5; min-height: 100vh; }
    .header { background: #059669; color: white; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .header a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }

    .puzzle-header { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em; color: #065f46; }
    .puzzle-arrow  { font-size: 1.4rem; color: #6ee7b7; }

    /* Word chain */
    .chain { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .chain-word {
      width: 130px; padding: 0.55rem 0;
      border-radius: 10px; font-family: monospace;
      font-size: 1.6rem; font-weight: 700; letter-spacing: 0.35rem;
      text-align: center;
    }
    .chain-word.start   { background: #d1fae5; color: #065f46; }
    .chain-word.step    { background: white; color: #1f2937;
                          box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .chain-word.current { background: #059669; color: white;
                          box-shadow: 0 2px 8px rgba(5,150,105,0.35); }
    .chain-word.target  { background: #fef3c7; color: #92400e;
                          border: 2px dashed #f59e0b; }
    .chain-arrow-down { color: #6ee7b7; font-size: 1.3rem; line-height: 1.2; margin: 0; }
    .chain-arrow-down.dashed { color: #d1d5db; }

    /* Letter diff highlight within step words */
    .diff-letter { color: #059669; text-decoration: underline; }
    .step .diff-letter { color: #059669; }

    .wrong-bar { font-size: 0.9rem; color: #6b7280; }
    .wrong-pip { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
                 margin: 0 2px; }
    .wrong-pip.used  { background: #ef4444; }
    .wrong-pip.empty { background: #d1d5db; }

    .result-card { border-radius: 14px; padding: 1rem 1.5rem; font-weight: 600; }
    .result-card.won  { background: #dcfce7; color: #15803d; }
    .result-card.lost { background: #fee2e2; color: #b91c1c; }

    #speech-text { font-size: 1rem; color: #374151; min-height: 1.5rem; }
    #voice-ring {
      width: 80px; height: 80px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem; transition: background 0.3s, box-shadow 0.3s;
    }
    #voice-ring.loading    { background: #f3f4f6; }
    #voice-ring.ready      { background: #d1fae5; }
    #voice-ring.speech     { background: #34d399; animation: ripple 1s infinite; }
    #voice-ring.processing { background: #9ca3af; }
    #voice-ring.speaking   { background: #dbeafe; }
    @keyframes ripple {
      0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
      50%      { box-shadow: 0 0 0 14px rgba(52,211,153,0); }
    }
    #status { font-size: 0.85rem; color: #6b7280; min-height: 1.4rem; }
  </style>
</head>
<body>

<div class="header">
  <a href="/games">← Games</a>
  <strong>🪜 Word Ladder</strong>
</div>

<div class="container py-4 text-center" style="max-width:420px">

  <!-- Puzzle header: START → TARGET -->
  <div class="puzzle-header mb-1">
    <span id="startLabel">—</span>
    <span class="puzzle-arrow mx-2">→</span>
    <span id="targetLabel">—</span>
  </div>
  <div class="text-muted small mb-3">Change one letter at a time — each step must be a real word</div>

  <!-- Wrong attempts pips -->
  <div class="wrong-bar mb-3" id="wrongBar"></div>

  <!-- Word chain -->
  <div class="chain mb-3" id="wordChain"></div>

  <!-- Result banner -->
  <div id="result-banner" class="result-card d-none mb-3"></div>

  <!-- Bianca speech -->
  <div id="speech-text" class="mb-3 fst-italic text-muted"></div>

  <!-- Voice indicator -->
  <div class="mb-1">
    <div id="voice-ring" class="loading">🎙️</div>
    <div id="status" class="mt-2">Loading voice engine...</div>
  </div>
  <div class="text-muted small mb-3">Say a word to take your next step</div>

  <!-- Typed fallback -->
  <div class="input-group mb-3" style="max-width:260px; margin:0 auto">
    <input type="text" id="type-input" class="form-control text-center font-monospace"
           maxlength="10" placeholder="type a word"
           onkeydown="if(event.key==='Enter') submitTyped()">
    <button class="btn" style="background:#059669;color:white;" onclick="submitTyped()">Go</button>
  </div>

  <div class="d-flex gap-2 justify-content-center">
    <button class="btn btn-outline-secondary btn-sm" onclick="getHint()">💡 Hint</button>
    <button class="btn btn-outline-secondary btn-sm" onclick="newGame()">🔄 New Game</button>
  </div>
</div>

<script>
let sessionId = sessionStorage.getItem('word_ladder_session') || '';
let gameData = null;
let gameOver = false;
let micVAD = null;
let isProcessing = false;

async function initVAD() {
  try {
    micVAD = await vad.MicVAD.new({
      baseAssetPath:    'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/',
      onnxWASMBasePath: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
      model: 'v5',
      positiveSpeechThreshold: 0.8,
      negativeSpeechThreshold: 0.3,
      minSpeechMs: 250,
      onSpeechStart: () => {
        if (!isProcessing) { setRing('speech'); setStatus('Listening...'); }
      },
      onSpeechEnd: async (audio) => {
        if (isProcessing) return;
        if (audio.length / 16000 > 4) return;
        isProcessing = true;
        micVAD.pause();
        setRing('processing');
        await transcribeAndStep(float32ToWav(audio, 16000));
      },
    });
    micVAD.start();
    setRing('ready');
    setStatus('Say a word to take your step');
  } catch (e) {
    setRing('loading');
    setStatus('Voice unavailable — use the HTTPS URL, or type below.');
    console.error('VAD init failed:', e);
  }
}

async function transcribeAndStep(blob) {
  try {
    const fd = new FormData();
    fd.append('audio', blob, 'recording.wav');
    const resp = await fetch('/transcribe', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.transcript && (data.confidence ?? 1) >= 0.25) {
      const t = data.transcript.trim().toLowerCase();
      if (/new game|restart|again|start over/i.test(t)) { newGame(); return; }
      if (/hint|help/i.test(t)) { await getHint(); return; }
      await submitWord(t);
    } else {
      setStatus("Didn't catch that — try again or type below.");
      resumeListening();
    }
  } catch {
    setStatus('Transcription failed — type below.');
    resumeListening();
  }
}

function submitTyped() {
  const input = document.getElementById('type-input');
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  input.value = '';
  submitWord(val);
}

async function submitWord(word) {
  if (!word) return;
  setStatus('Checking...');
  try {
    const resp = await fetch('/games/word-ladder/step', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, word }),
    });
    applyState(await resp.json());
  } catch {
    setStatus('Network error. Please try again.');
    resumeListening();
  }
}

async function getHint() {
  setStatus('Getting hint...');
  try {
    const resp = await fetch('/games/word-ladder/hint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId }),
    });
    const data = await resp.json();
    if (data.speech) {
      document.getElementById('speech-text').textContent = '💡 ' + data.speech;
      speak(data.speech, () => resumeListening());
    } else {
      resumeListening();
    }
  } catch {
    resumeListening();
  }
}

async function newGame() {
  document.getElementById('result-banner').classList.add('d-none');
  gameOver = false;
  setStatus('Generating puzzle...');
  if (micVAD) micVAD.pause();
  try {
    const resp = await fetch('/games/word-ladder/new', { method: 'POST' });
    applyState(await resp.json());
  } catch {
    setStatus('Could not generate puzzle. Try again.');
    resumeListening();
  }
}

function applyState(data) {
  if (data.session_id) {
    sessionId = data.session_id;
    sessionStorage.setItem('word_ladder_session', sessionId);
  }
  gameData = data;

  document.getElementById('startLabel').textContent  = (data.start_word  || '').toUpperCase();
  document.getElementById('targetLabel').textContent = (data.target_word || '').toUpperCase();

  buildChain(data);
  buildWrongBar(data);

  const banner = document.getElementById('result-banner');
  if (data.won) {
    gameOver = true;
    const steps = (data.path || []).length - 1;
    banner.className = 'result-card won mb-3';
    banner.textContent = `🎉 You did it in ${steps} step${steps === 1 ? '' : 's'}!`;
    banner.classList.remove('d-none');
  } else if (data.lost) {
    gameOver = true;
    banner.className = 'result-card lost mb-3';
    banner.textContent = `😢 Out of attempts! The target was ${(data.target_word || '').toUpperCase()}.`;
    banner.classList.remove('d-none');
  }

  if (data.speech) {
    document.getElementById('speech-text').textContent = '💬 ' + data.speech;
    speak(data.speech, () => {
      resumeListening();
      if (gameOver) setStatus('Say "new game" or tap New Game!');
    });
  } else {
    resumeListening();
  }
}

function buildChain(data) {
  const chain = document.getElementById('wordChain');
  chain.innerHTML = '';
  const path = data.path || [];
  const target = (data.target_word || '').toLowerCase();
  const isOver = data.won || data.lost;

  path.forEach((word, idx) => {
    const div = document.createElement('div');
    div.className = 'chain-word ' + (idx === 0 ? 'start' : 'step');

    // Highlight differing letter vs previous word
    if (idx > 0) {
      const prev = path[idx - 1];
      div.innerHTML = word.toUpperCase().split('').map((ch, i) =>
        ch !== (prev[i] || '').toUpperCase()
          ? `<span class="diff-letter">${ch}</span>`
          : ch
      ).join('');
    } else {
      div.textContent = word.toUpperCase();
    }
    chain.appendChild(div);

    if (idx < path.length - 1 || !isOver) {
      const arrow = document.createElement('div');
      arrow.className = 'chain-arrow-down';
      arrow.textContent = '↓';
      chain.appendChild(arrow);
    }
  });

  // Current word (if still playing and current !== last in path)
  if (!isOver && path.length > 0 && data.current_word !== path[path.length - 1]) {
    const div = document.createElement('div');
    div.className = 'chain-word current';
    div.textContent = data.current_word.toUpperCase();
    chain.appendChild(div);
    const arrow = document.createElement('div');
    arrow.className = 'chain-arrow-down dashed';
    arrow.textContent = '↓';
    chain.appendChild(arrow);
  } else if (!isOver) {
    // Last path item is current — mark it
    const items = chain.querySelectorAll('.chain-word');
    if (items.length) items[items.length - 1].className = 'chain-word current';
    const arrow = document.createElement('div');
    arrow.className = 'chain-arrow-down dashed';
    arrow.textContent = '↓';
    chain.appendChild(arrow);
  }

  // Target word
  const targetDiv = document.createElement('div');
  targetDiv.className = 'chain-word target';
  targetDiv.textContent = target.toUpperCase();
  chain.appendChild(targetDiv);
}

function buildWrongBar(data) {
  const bar = document.getElementById('wrongBar');
  const max = data.max_wrong || 5;
  const used = data.wrong_attempts || 0;
  let html = 'Wrong attempts: ';
  for (let i = 0; i < max; i++) {
    html += `<span class="wrong-pip ${i < used ? 'used' : 'empty'}"></span>`;
  }
  bar.innerHTML = html;
}

function resumeListening() {
  isProcessing = false;
  if (micVAD) micVAD.start();
  setRing('ready');
  if (!gameOver) setStatus('Say a word to take your step');
}

function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  if (micVAD) micVAD.pause();
  window.speechSynthesis.cancel();
  setRing('speaking');
  setStatus('Bianca is speaking...');
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 1.05;
  let fired = false;
  const wd = setTimeout(() => {
    if (!fired) { fired = true; if (onDone) onDone(); else resumeListening(); }
  }, Math.ceil(text.length / 15) * 1000 + 3000);
  utt.onend  = () => { if (!fired) { fired = true; clearTimeout(wd); if (onDone) onDone(); else resumeListening(); } };
  utt.onerror = () => { if (!fired) { fired = true; clearTimeout(wd); if (onDone) onDone(); else resumeListening(); } };
  window.speechSynthesis.speak(utt);
}

function setRing(s) { document.getElementById('voice-ring').className = s; }
function setStatus(m) { document.getElementById('status').textContent = m; }

function float32ToWav(samples, sampleRate) {
  const len = samples.length;
  const buf = new ArrayBuffer(44 + len * 2);
  const view = new DataView(buf);
  const w = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  w(0,'RIFF'); view.setUint32(4,36+len*2,true);
  w(8,'WAVE'); w(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,1,true);  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true);
  view.setUint16(34,16,true); w(36,'data');
  view.setUint32(40,len*2,true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true); off += 2;
  }
  return new Blob([buf], { type: 'audio/wav' });
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

window.onload = () => { initVAD(); newGame(); };
</script>
</body>
</html>
