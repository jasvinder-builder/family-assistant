<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hangman — Bianca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #fef3c7; }
    .header { background: #f59e0b; color: white; padding: 1rem 1.5rem; }
    .header a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }
    #figure {
      font-family: monospace; font-size: 1.1rem; white-space: pre;
      background: white; border-radius: 12px; display: inline-block;
      padding: 1rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      line-height: 1.5;
    }
    #word-display { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.4rem; color: #1f2937; }
    #wrong-letters { color: #dc2626; font-size: 1.1rem; min-height: 1.6rem; letter-spacing: 0.15rem; }
    #speech-text { font-size: 1.05rem; color: #374151; min-height: 1.6rem; }
    #mic-btn {
      width: 90px; height: 90px; border-radius: 50%; font-size: 2.2rem;
      border: none; background: #f59e0b; color: white;
      box-shadow: 0 4px 16px rgba(245,158,11,0.45);
      transition: transform .1s, background .2s;
    }
    #mic-btn.listening { background: #dc2626; animation: pulse 1.2s infinite; }
    #mic-btn:disabled { background: #9ca3af; box-shadow: none; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); } 50% { box-shadow: 0 0 0 14px rgba(220,38,38,0); } }
    #status { font-size: 0.85rem; color: #6b7280; min-height: 1.4rem; }
    .won-banner { background: #dcfce7; border: 2px solid #16a34a; border-radius: 12px; color: #15803d; }
    .lost-banner { background: #fee2e2; border: 2px solid #dc2626; border-radius: 12px; color: #b91c1c; }
    .no-support { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 10px; }
  </style>
</head>
<body>

<div class="header d-flex align-items-center gap-3">
  <a href="/">← Home</a>
  <strong class="text-white ms-1">Hangman</strong>
</div>

<div class="container py-4 text-center" style="max-width:520px">

  <div class="no-support p-3 mb-3 d-none" id="no-support">
    ⚠️ Voice input requires the <strong>HTTPS</strong> ngrok URL. You can still type guesses below.
  </div>

  <!-- Hangman figure -->
  <div class="mb-3">
    <div id="figure">Loading...</div>
  </div>

  <!-- Word display -->
  <div id="word-display" class="mb-2">_ _ _</div>

  <!-- Wrong letters -->
  <div class="mb-3">
    <span class="text-muted small">Wrong: </span>
    <span id="wrong-letters">—</span>
  </div>

  <!-- Bianca's speech -->
  <div id="speech-text" class="mb-4 fst-italic text-muted"></div>

  <!-- Win / loss banner -->
  <div id="result-banner" class="p-3 mb-4 d-none"></div>

  <!-- Mic + type input -->
  <div class="mb-1">
    <button id="mic-btn" onclick="toggleListen()">🎙️</button>
    <div id="status" class="mt-2">Tap mic, say "letter A" or "word elephant"</div>
  </div>
  <div class="text-muted small mb-3">Auto-stops after 2 seconds of silence</div>

  <div class="input-group mb-4" style="max-width:300px;margin:0 auto">
    <input type="text" id="type-input" class="form-control text-center" maxlength="30"
           placeholder='e.g. "letter A" or "word elephant"' onkeydown="if(event.key==='Enter') submitTyped()">
    <button class="btn btn-warning" onclick="submitTyped()">Guess</button>
  </div>

  <button class="btn btn-outline-secondary" onclick="newGame()">🔄 New Game</button>
</div>

<script>
let sessionId = sessionStorage.getItem('hangman_session') || '';
let gameOver = false;
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let stream = null;

function toggleListen() {
  recording ? stopRecording() : startRecording();
}

async function startRecording() {
  if (gameOver) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setStatus('Mic access denied. Type your guess below.');
    return;
  }
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    await transcribeAndGuess(blob);
  };
  mediaRecorder.start();
  recording = true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-btn').textContent = '⏹️';
  setStatus('Recording... tap to stop');
  startSilenceDetection();
}

function startSilenceDetection() {
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  const dataArray = new Uint8Array(analyser.fftSize);

  const SILENCE_THRESHOLD = 8;   // amplitude units (0-128)
  const SILENCE_DURATION  = 2000; // ms of silence before auto-stop
  let speechDetected = false;
  let silenceTimer = null;

  function check() {
    if (!recording) return;
    analyser.getByteTimeDomainData(dataArray);
    const volume = Math.max(...Array.from(dataArray).map(v => Math.abs(v - 128)));

    if (volume > SILENCE_THRESHOLD) {
      speechDetected = true;
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
    } else if (speechDetected && !silenceTimer) {
      silenceTimer = setTimeout(() => { if (recording) stopRecording(); }, SILENCE_DURATION);
    }
    requestAnimationFrame(check);
  }
  requestAnimationFrame(check);
}

function stopRecording() {
  if (!recording) return;
  recording = false;
  mediaRecorder.stop();
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent = '🎙️';
  document.getElementById('mic-btn').disabled = true;
  setStatus('Transcribing...');
}

async function transcribeAndGuess(blob) {
  try {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.webm');
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.transcript && data.transcript.trim().length > 0) {
      await submitGuess(data.transcript.trim());
    } else {
      setStatus("Didn't catch that — try again or type below.");
      document.getElementById('mic-btn').disabled = false;
    }
  } catch(e) {
    setStatus('Transcription failed. Type your guess below.');
    document.getElementById('mic-btn').disabled = false;
  }
}

function submitTyped() {
  const input = document.getElementById('type-input');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  submitGuess(val);
}

async function submitGuess(text) {
  if (!text) return;

  // New game request via voice
  if (/new game|restart|again|reset|start over/i.test(text)) {
    newGame();
    return;
  }

  document.getElementById('mic-btn').disabled = true;
  setStatus('Checking...');

  try {
    const resp = await fetch('/games/hangman/guess', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, guess: text}),
    });
    const data = await resp.json();
    applyState(data);
  } catch(e) {
    setStatus('Network error. Please try again.');
  }

  document.getElementById('mic-btn').disabled = gameOver;
}

async function newGame() {
  document.getElementById('result-banner').classList.add('d-none');
  gameOver = false;
  document.getElementById('mic-btn').disabled = false;

  const resp = await fetch('/games/hangman/new', {method: 'POST'});
  const data = await resp.json();
  sessionId = data.session_id;
  sessionStorage.setItem('hangman_session', sessionId);
  applyState(data);
}

function applyState(data) {
  if (data.session_id && data.session_id !== sessionId) {
    sessionId = data.session_id;
    sessionStorage.setItem('hangman_session', sessionId);
  }

  document.getElementById('figure').textContent = data.figure;
  document.getElementById('word-display').textContent = data.display_word;
  document.getElementById('wrong-letters').textContent = data.wrong_letters.length ? data.wrong_letters.join('  ') : '—';

  const banner = document.getElementById('result-banner');
  if (data.won) {
    gameOver = true;
    banner.className = 'p-3 mb-4 won-banner';
    banner.textContent = `🎉 You won! The word was ${data.word}.`;
    banner.classList.remove('d-none');
    setStatus('Say "new game" or tap New Game to play again!');
  } else if (data.lost) {
    gameOver = true;
    banner.className = 'p-3 mb-4 lost-banner';
    banner.textContent = `😢 Game over! The word was ${data.word}.`;
    banner.classList.remove('d-none');
    setStatus('Say "new game" or tap New Game to play again!');
  }

  if (data.speech) {
    document.getElementById('speech-text').textContent = '💬 ' + data.speech;
    // Re-enable mic only after Bianca finishes speaking to avoid picking up her voice
    speak(data.speech, () => {
      document.getElementById('mic-btn').disabled = false;
      if (!gameOver) setStatus('Tap mic or type a letter below');
    });
  } else {
    document.getElementById('mic-btn').disabled = false;
  }
}

function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 1.05;
  utt.onend = () => { if (onDone) onDone(); };
  utt.onerror = () => { if (onDone) onDone(); };
  window.speechSynthesis.speak(utt);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Pre-warm speech synthesis so first response plays immediately
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Start or resume game on load
window.onload = () => {
  if (sessionId) {
    // Try to resume — just start fresh since session is in-memory
    newGame();
  } else {
    newGame();
  }
};
</script>
</body>
</html>
