<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hangman — Bianca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/bundle.min.js"></script>
  <style>
    body { background: #fef3c7; }
    .header { background: #f59e0b; color: white; padding: 1rem 1.5rem; }
    .header a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }
    #figure {
      font-family: monospace; font-size: 1.1rem; white-space: pre;
      background: white; border-radius: 12px; display: inline-block;
      padding: 1rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      line-height: 1.5;
    }
    #word-display   { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.4rem; color: #1f2937; }
    #wrong-letters  { color: #dc2626; font-size: 1.1rem; min-height: 1.6rem; letter-spacing: 0.15rem; }
    #speech-text    { font-size: 1.05rem; color: #374151; min-height: 1.6rem; }
    #voice-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: #fef3c7; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 2rem;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #voice-ring.loading    { background: #f3f4f6; }
    #voice-ring.ready      { background: #fde68a; }
    #voice-ring.speech     { background: #f59e0b; animation: ripple 1s infinite; }
    #voice-ring.processing { background: #9ca3af; }
    #voice-ring.speaking   { background: #dbeafe; }
    @keyframes ripple {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.35); }
      50%      { box-shadow: 0 0 0 14px rgba(245,158,11,0); }
    }
    #status       { font-size: 0.85rem; color: #6b7280; min-height: 1.4rem; }
    .won-banner   { background: #dcfce7; border: 2px solid #16a34a; border-radius: 12px; color: #15803d; }
    .lost-banner  { background: #fee2e2; border: 2px solid #dc2626; border-radius: 12px; color: #b91c1c; }
  </style>
</head>
<body>

<div class="header d-flex align-items-center gap-3">
  <a href="/">← Home</a>
  <strong class="text-white ms-1">Hangman</strong>
</div>

<div class="container py-4 text-center" style="max-width:520px">

  <!-- Hangman figure -->
  <div class="mb-3">
    <div id="figure">Loading...</div>
  </div>

  <!-- Word display -->
  <div id="word-display" class="mb-2">_ _ _</div>

  <!-- Wrong letters -->
  <div class="mb-3">
    <span class="text-muted small">Wrong: </span>
    <span id="wrong-letters">—</span>
  </div>

  <!-- Bianca's speech -->
  <div id="speech-text" class="mb-4 fst-italic text-muted"></div>

  <!-- Win / loss banner -->
  <div id="result-banner" class="p-3 mb-4 d-none"></div>

  <!-- Voice indicator -->
  <div class="mb-1">
    <div id="voice-ring" class="loading">🎙️</div>
    <div id="status" class="mt-2">Loading voice engine...</div>
  </div>
  <div class="text-muted small mb-3">Say "letter A" or "word elephant"</div>

  <!-- Typed fallback -->
  <div class="input-group mb-4" style="max-width:300px;margin:0 auto">
    <input type="text" id="type-input" class="form-control text-center" maxlength="30"
           placeholder='"letter A" or "word elephant"' onkeydown="if(event.key==='Enter') submitTyped()">
    <button class="btn btn-warning" onclick="submitTyped()">Guess</button>
  </div>

  <button class="btn btn-outline-secondary" onclick="newGame()">🔄 New Game</button>
</div>

<script>
let sessionId = sessionStorage.getItem('hangman_session') || '';
let gameOver = false;
let micVAD = null;
let isProcessing = false;

async function initVAD() {
  try {
    micVAD = await vad.MicVAD.new({
      baseAssetPath:   'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.30/dist/',
      onnxWASMBasePath:'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
      model: 'v5',
      positiveSpeechThreshold: 0.8,
      negativeSpeechThreshold: 0.3,
      minSpeechMs: 250,
      onSpeechStart: () => {
        if (!isProcessing) {
          setRing('speech');
          setStatus('Listening...');
        }
      },
      onSpeechEnd: async (audio) => {
        if (isProcessing) return;
        // Duration guard: TTS echo is always long; real guesses are short
        if (audio.length / 16000 > 4) return;
        isProcessing = true;
        micVAD.pause();
        setRing('processing');
        await transcribeAndGuess(float32ToWav(audio, 16000));
      },
    });
    micVAD.start();
    setRing('ready');
    setStatus('Just speak your guess');
  } catch (e) {
    setRing('loading');
    setStatus('Voice unavailable — use the HTTPS ngrok URL, or type below.');
    console.error('VAD init failed:', e);
  }
}

async function transcribeAndGuess(blob) {
  try {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.wav');
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.transcript && data.transcript.trim().length > 0 && (data.confidence ?? 1) >= 0.30) {
      await submitGuess(data.transcript.trim());
    } else {
      setStatus("Didn't catch that — try again or type below.");
      resumeListening();
    }
  } catch (e) {
    setStatus('Transcription failed. Type your guess below.');
    resumeListening();
  }
}

function submitTyped() {
  const input = document.getElementById('type-input');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  submitGuess(val);
}

async function submitGuess(text) {
  if (!text) return;

  if (/new game|restart|again|reset|start over/i.test(text)) {
    newGame();
    return;
  }

  setStatus('Checking...');

  try {
    const resp = await fetch('/games/hangman/guess', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, guess: text }),
    });
    const data = await resp.json();
    applyState(data);
  } catch (e) {
    setStatus('Network error. Please try again.');
    resumeListening();
  }
}

async function newGame() {
  document.getElementById('result-banner').classList.add('d-none');
  gameOver = false;
  const resp = await fetch('/games/hangman/new', { method: 'POST' });
  const data = await resp.json();
  sessionId = data.session_id;
  sessionStorage.setItem('hangman_session', sessionId);
  applyState(data);
}

function applyState(data) {
  if (data.session_id && data.session_id !== sessionId) {
    sessionId = data.session_id;
    sessionStorage.setItem('hangman_session', sessionId);
  }

  document.getElementById('figure').textContent = data.figure;
  document.getElementById('word-display').textContent = data.display_word;
  document.getElementById('wrong-letters').textContent = data.wrong_letters.length ? data.wrong_letters.join('  ') : '—';

  const banner = document.getElementById('result-banner');
  if (data.won) {
    gameOver = true;
    banner.className = 'p-3 mb-4 won-banner';
    banner.textContent = `🎉 You won! The word was ${data.word}.`;
    banner.classList.remove('d-none');
  } else if (data.lost) {
    gameOver = true;
    banner.className = 'p-3 mb-4 lost-banner';
    banner.textContent = `😢 Game over! The word was ${data.word}.`;
    banner.classList.remove('d-none');
  }

  if (data.speech) {
    document.getElementById('speech-text').textContent = '💬 ' + data.speech;
    speak(data.speech, () => {
      resumeListening();
      if (gameOver) setStatus('Say "new game" or tap New Game to play again!');
    });
  } else {
    resumeListening();
  }
}

function resumeListening() {
  isProcessing = false;
  if (micVAD) micVAD.start();
  setRing('ready');
  if (!gameOver) setStatus('Just speak your guess');
}

function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  if (micVAD) micVAD.pause();
  window.speechSynthesis.cancel();
  setRing('speaking');
  setStatus('Bianca is speaking...');
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 1.05;
  // Watchdog: speechSynthesis.onend is unreliable on mobile — force resume if it never fires.
  let fired = false;
  const watchdog = setTimeout(() => {
    if (!fired) { fired = true; if (onDone) onDone(); else resumeListening(); }
  }, Math.ceil(text.length / 15) * 1000 + 3000);
  utt.onend = () => {
    if (!fired) { fired = true; clearTimeout(watchdog); if (onDone) onDone(); else resumeListening(); }
  };
  utt.onerror = () => {
    if (!fired) { fired = true; clearTimeout(watchdog); if (onDone) onDone(); else resumeListening(); }
  };
  window.speechSynthesis.speak(utt);
}

function setRing(state) {
  document.getElementById('voice-ring').className = state;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function float32ToWav(samples, sampleRate) {
  const len = samples.length;
  const buf = new ArrayBuffer(44 + len * 2);
  const view = new DataView(buf);
  const w = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  w(0, 'RIFF'); view.setUint32(4, 36 + len * 2, true);
  w(8, 'WAVE'); w(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
  view.setUint16(34, 16, true); w(36, 'data');
  view.setUint32(40, len * 2, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    off += 2;
  }
  return new Blob([buf], { type: 'audio/wav' });
}

// Pre-warm speech synthesis so first response plays immediately
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

window.onload = () => {
  initVAD();
  newGame();
};
</script>
</body>
</html>
