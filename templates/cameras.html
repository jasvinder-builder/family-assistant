<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cameras — Bianca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
    .hero-text h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .hero-text p { opacity: 0.85; font-size: 0.85rem; margin: 0.15rem 0 0; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); }
    #videoFeed { width: 100%; max-height: 480px; object-fit: contain; border-radius: 10px; background: #000; display: block; }
    .construction-box { border: 2px dashed #cbd5e1; border-radius: 16px; background: #f8fafc; }
  </style>
</head>
<body>

<div class="hero">
  <a href="/" class="btn btn-light btn-sm fw-semibold">← Home</a>
  <div class="hero-text">
    <h1>📷 Cameras</h1>
    <p>Live stream viewer</p>
  </div>
</div>

<div class="container py-4" style="max-width:800px;">

  <!-- RTSP URL form -->
  <div class="card mb-4">
    <div class="card-body">
      <h6 class="fw-semibold mb-3">Camera Stream</h6>
      <div class="input-group">
        <input type="text" id="rtspUrl" class="form-control font-monospace"
               placeholder="rtsp://username:password@192.168.1.100:554/stream"
               value="{{ current_url or 'rtsp://zGFoMXarNI9GEdwg8nQe7xL6ZNQwhM3u:p0N-dg3ds_t_bY-zRmGf3@test.rtsp.stream/people' }}">
        <button class="btn btn-primary" id="connectBtn" onclick="connectStream()">Connect</button>
      </div>
      <div id="statusMsg" class="mt-2 small"></div>
    </div>
  </div>

  <!-- Live video -->
  <div id="videoSection" class="card mb-4 {% if not current_url %}d-none{% endif %}">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-semibold mb-0">Live View</h6>
        <button class="btn btn-outline-danger btn-sm" onclick="disconnectStream()">Disconnect</button>
      </div>
      <img id="videoFeed" src="{% if current_url %}/cameras/stream{% endif %}" alt="Camera feed">
      <div id="streamError" class="text-danger small mt-2 d-none">
        Stream unavailable — check the RTSP URL and camera connectivity.
      </div>
    </div>
  </div>

  <!-- Future features placeholder -->
  <div class="construction-box p-5 text-center text-muted">
    <div style="font-size:2.5rem;">🚧</div>
    <div class="fw-semibold mt-2 fs-6">AI Event Detection — Coming Soon</div>
    <div class="small mt-2 text-muted" style="max-width:400px;margin:0 auto;">
      Significant events with timestamps will appear here — powered by YOLOv8, ByteTrack, and Qwen summarisation.
    </div>
  </div>

</div>

<script>
  const videoFeed = document.getElementById('videoFeed');
  const videoSection = document.getElementById('videoSection');
  const statusMsg = document.getElementById('statusMsg');
  const streamError = document.getElementById('streamError');

  // Detect broken stream
  videoFeed.onerror = () => {
    streamError.classList.remove('d-none');
  };
  videoFeed.onload = () => {
    streamError.classList.add('d-none');
  };

  async function connectStream() {
    const url = document.getElementById('rtspUrl').value.trim();
    if (!url) {
      statusMsg.className = 'mt-2 small text-danger';
      statusMsg.textContent = 'Please enter an RTSP URL.';
      return;
    }

    statusMsg.className = 'mt-2 small text-muted';
    statusMsg.textContent = 'Connecting…';
    document.getElementById('connectBtn').disabled = true;

    try {
      const res = await fetch('/cameras/set-stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (res.ok) {
        streamError.classList.add('d-none');
        videoFeed.src = '/cameras/stream?' + Date.now();
        videoSection.classList.remove('d-none');
        statusMsg.className = 'mt-2 small text-success';
        statusMsg.textContent = 'Connected.';
      } else {
        statusMsg.className = 'mt-2 small text-danger';
        statusMsg.textContent = data.error || 'Failed to connect.';
      }
    } catch {
      statusMsg.className = 'mt-2 small text-danger';
      statusMsg.textContent = 'Network error — server may be offline.';
    } finally {
      document.getElementById('connectBtn').disabled = false;
    }
  }

  async function disconnectStream() {
    videoFeed.src = '';
    videoSection.classList.add('d-none');
    streamError.classList.add('d-none');
    statusMsg.className = 'mt-2 small text-muted';
    statusMsg.textContent = '';
    await fetch('/cameras/set-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: '' })
    });
  }
</script>

</body>
</html>
